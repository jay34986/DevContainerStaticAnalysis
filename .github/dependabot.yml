---
version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/.devcontainer/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/.devcontainer/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/.devcontainer/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    cooldown:
      default-days: 7
